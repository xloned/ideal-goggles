<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}АРМ оператора по продажам{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; }
        nav { background: #2c3e50; padding: 0 20px; display: flex; align-items: center; gap: 0; }
        nav a { color: #ecf0f1; text-decoration: none; padding: 15px 18px; font-size: 14px; transition: background .2s; }
        nav a:hover, nav a.active { background: #34495e; }
        nav .brand { font-weight: bold; font-size: 16px; margin-right: 20px; color: #fff; padding: 15px 0; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        h1 { margin-bottom: 20px; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        th { background: #34495e; color: #fff; font-weight: 600; }
        tr:hover { background: #f5f5f5; }
        .btn { display: inline-block; padding: 8px 18px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; text-decoration: none; transition: background .2s; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        .btn-success { background: #27ae60; color: #fff; }
        .btn-success:hover { background: #219a52; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover { background: #c0392b; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: #3498db; box-shadow: 0 0 0 2px rgba(52,152,219,.2);
        }
        .card { background: #fff; border-radius: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 20px; margin-bottom: 20px; }
        .alert { padding: 12px 18px; border-radius: 4px; margin-bottom: 15px; }
        .alert-warning { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
        .alert-danger { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .text-danger { color: #e74c3c; font-weight: bold; }
        .text-success { color: #27ae60; }
        .text-right { text-align: right; }
        .mb-10 { margin-bottom: 10px; }
        .mt-10 { margin-top: 10px; }
        .flex { display: flex; gap: 20px; }
        .flex-1 { flex: 1; }
    </style>
</head>
<body>
    <nav>
        <span class="brand">АРМ Продажи</span>
        <a href="{% url 'index' %}">Главная</a>
        <a href="{% url 'client_list' %}">Клиенты</a>
        <a href="{% url 'product_list' %}">Товары</a>
        <a href="{% url 'order_create' %}">Новый заказ</a>
        <a href="{% url 'order_list' %}">Заказы</a>
        <a href="{% url 'report' %}">Отчёт</a>
        <a href="{% url 'monitoring_dashboard' %}" style="margin-left:auto; background:#8e44ad;">Мониторинг</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
