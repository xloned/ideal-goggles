<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}АРМ оператора по продажам{% endblock %}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #f8f9fb; color: #1a1a2e; display: flex; min-height: 100vh; }

        /* ─── Sidebar ─── */
        .sidebar {
            width: 260px; background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            color: #fff; padding: 30px 0; position: fixed; top: 0; left: 0; height: 100vh;
            display: flex; flex-direction: column; z-index: 100;
        }
        .sidebar .brand {
            font-size: 18px; font-weight: 700; padding: 0 24px 30px; letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255,255,255,.15);
        }
        .sidebar .brand small { display: block; font-size: 11px; font-weight: 400; opacity: .7; margin-top: 4px; }
        .sidebar nav { margin-top: 20px; flex: 1; }
        .sidebar nav a {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 24px; color: rgba(255,255,255,.8); text-decoration: none;
            font-size: 14px; font-weight: 500; transition: all .2s; border-left: 3px solid transparent;
        }
        .sidebar nav a:hover { background: rgba(255,255,255,.1); color: #fff; border-left-color: #fff; }
        .sidebar nav a .icon { font-size: 18px; width: 24px; text-align: center; }

        /* ─── Main content ─── */
        .main { margin-left: 260px; flex: 1; padding: 30px 40px; }
        .page-header { margin-bottom: 28px; }
        .page-header h1 { font-size: 26px; font-weight: 700; color: #1a1a2e; }
        .page-header p { color: #6c757d; font-size: 14px; margin-top: 4px; }

        /* ─── Cards ─── */
        .v2-card {
            background: #fff; border-radius: 12px; padding: 24px;
            box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
            margin-bottom: 20px; border: 1px solid #e8ecf1;
        }
        .v2-card h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #1a1a2e; }
        .v2-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #333; }

        /* ─── Dashboard cards ─── */
        .dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .dash-card {
            background: #fff; border-radius: 14px; padding: 28px;
            border: 1px solid #e8ecf1; transition: all .25s; cursor: pointer; text-decoration: none; color: inherit;
            display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 1px 3px rgba(0,0,0,.04);
        }
        .dash-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(102,126,234,.15); border-color: #667eea; }
        .dash-card .dash-icon {
            width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }
        .dash-card .dash-icon.blue { background: #e8f0fe; color: #667eea; }
        .dash-card .dash-icon.green { background: #e6f9f0; color: #10b981; }
        .dash-card .dash-icon.purple { background: #f0e8fe; color: #764ba2; }
        .dash-card .dash-icon.orange { background: #fff4e6; color: #f59e0b; }
        .dash-card h3 { font-size: 16px; font-weight: 600; margin: 0; }
        .dash-card p { font-size: 13px; color: #6c757d; margin: 0; line-height: 1.5; }

        /* ─── Tables ─── */
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { background: #f8f9fb; color: #5f6b7a; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; padding: 12px 16px; text-align: left; border-bottom: 2px solid #e8ecf1; }
        td { padding: 12px 16px; border-bottom: 1px solid #f0f2f5; font-size: 14px; color: #333; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8f9fb; }
        tbody tr { transition: background .15s; }

        /* ─── Buttons ─── */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 9px 20px; border: none; border-radius: 8px; cursor: pointer;
            font-size: 14px; font-weight: 500; text-decoration: none; transition: all .2s;
        }
        .btn-primary { background: #667eea; color: #fff; }
        .btn-primary:hover { background: #5a6fd6; box-shadow: 0 4px 12px rgba(102,126,234,.3); }
        .btn-success { background: #10b981; color: #fff; }
        .btn-success:hover { background: #0ea572; box-shadow: 0 4px 12px rgba(16,185,129,.3); }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; box-shadow: 0 4px 12px rgba(239,68,68,.3); }
        .btn-outline { background: transparent; border: 1px solid #d1d5db; color: #374151; }
        .btn-outline:hover { background: #f3f4f6; }
        .btn-sm { padding: 5px 14px; font-size: 12px; border-radius: 6px; }

        /* ─── Forms ─── */
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 13px; color: #374151; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px;
            font-size: 14px; background: #fff; color: #1a1a2e; transition: all .2s;
            font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,.15);
        }

        /* ─── Alerts ─── */
        .alert { padding: 14px 18px; border-radius: 10px; margin-bottom: 16px; font-size: 14px; font-weight: 500; }
        .alert-warning { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
        .alert-danger { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

        /* ─── Badges ─── */
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-green { background: #d1fae5; color: #065f46; }
        .badge-red { background: #fee2e2; color: #991b1b; }
        .badge-blue { background: #dbeafe; color: #1e40af; }

        .text-danger { color: #ef4444; font-weight: 600; }
        .text-success { color: #10b981; }
        .text-muted { color: #9ca3af; font-size: 13px; }
        .flex { display: flex; gap: 20px; }
        .flex-1 { flex: 1; }
        .mb-12 { margin-bottom: 12px; }
        .mt-12 { margin-top: 12px; }

        .search-bar {
            display: flex; gap: 10px; margin-bottom: 16px;
        }
        .search-bar input {
            flex: 1; padding: 10px 16px; border: 1px solid #d1d5db; border-radius: 8px;
            font-size: 14px; transition: all .2s;
        }
        .search-bar input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,.15); }

        .stat-value { font-size: 22px; font-weight: 700; color: #1a1a2e; }
        .stat-label { font-size: 12px; color: #6c757d; font-weight: 500; text-transform: uppercase; letter-spacing: .3px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="brand">
            АРМ Продажи
            <small>Оператор по продажам</small>
        </div>
        <nav>
            <a href="{% url 'index_v2' %}"><span class="icon">&#9776;</span> Главная</a>
            <a href="{% url 'client_list_v2' %}"><span class="icon">&#128101;</span> Клиенты</a>
            <a href="{% url 'product_list_v2' %}"><span class="icon">&#128230;</span> Товары</a>
            <a href="{% url 'order_create_v2' %}"><span class="icon">&#128221;</span> Новый заказ</a>
            <a href="{% url 'order_list_v2' %}"><span class="icon">&#128196;</span> Заказы</a>
            <a href="{% url 'report_v2' %}"><span class="icon">&#128202;</span> Отчёт</a>
        </nav>
    </aside>
    <main class="main">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
